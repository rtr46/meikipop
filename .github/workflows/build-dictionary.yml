# .github/workflows/build-dictionary.yml
name: dictionary build

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 7:00 AM UTC
  workflow_dispatch: # Also allow manual trigger

permissions:
  contents: write # Needed to create/update the release

jobs:
  build-dictionary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: build dictionary
        run: python -m meikipop.scripts.build_dictionary

      - name: update dictionary-latest release
        run: |
          gh release delete dictionary-latest --yes --cleanup-tag || true
          gh release create dictionary-latest \
            --title "Dictionary (latest)" \
            --notes "Auto-updated dictionary. Rebuilt every Monday or on manual trigger." \
            --prerelease \
            dictionary.pkl